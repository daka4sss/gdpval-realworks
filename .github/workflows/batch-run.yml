name: Run GDPVal Batch Experiment

# This workflow can only be triggered manually from the GitHub Actions tab.
# Only users with repo write access can run it → security enforced automatically.
on:
  workflow_dispatch:
    inputs:
      experiment_yaml:
        description: 'Experiment YAML filename (without .yaml extension, e.g., "exp998_smoke_baseline_sample")'
        required: true
        type: string
      experiment_name:
        description: 'Experiment name (optional - will auto-extract from YAML if empty)'
        required: false
        type: string
      dry_run:
        description: 'Dry run (skip HF upload and PR creation)'
        required: false
        type: boolean
        default: false
      relay_run:
        description: 'Relay run number (0=initial, 1+=continuation). Auto-set by retrigger.'
        required: false
        type: number
        default: 0
      wall_timeout:
        description: 'Wall-clock timeout in minutes for Step 2 (0=no limit, 270 recommended for code_interpreter)'
        required: false
        type: number
        default: 0

permissions:
  contents: write        # to commit yaml results
  pull-requests: write   # to create PRs
  actions: write          # for relay self-retrigger (gh workflow run)

env:
  PYTHON_VERSION: '3.11'

jobs:
  batch-run:
    runs-on: ubuntu-latest
    timeout-minutes: 360    # max 6 hours

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      # ── System deps for native Python packages (pycairo/pygraphviz, etc.) ──
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libcairo2-dev \
            libffi-dev \
            graphviz \
            libgraphviz-dev

      - name: Install dependencies
        run: |
          pip install -r batch-runner/requirements.txt

      # ── Verify runtime environment ──
      - name: Verify runtime environment
        run: |
          echo "============================================"
          echo "🔍 Runtime Environment Check"
          echo "============================================"
          echo "🐍 Python: $(python3 --version)"
          echo "📦 pip: $(pip --version)"
          echo "🎬 ffmpeg: $(ffmpeg -version 2>&1 | head -1)"
          echo "📄 LibreOffice: $(libreoffice --version 2>/dev/null || echo 'not installed (expected for baseline)')"
          echo "🔤 Noto Sans: $(fc-list 2>/dev/null | grep -c 'Noto Sans') fonts found"
          echo "💾 Disk: $(df -h / | tail -1 | awk '{print $4}') available"
          echo "🧠 Memory: $(free -m | grep Mem | awk '{print $2}')MB total, $(free -m | grep Mem | awk '{print $7}')MB available"
          echo "💾 Swap: $(free -m | grep Swap | awk '{print $2}')MB total"
          echo "🔒 Subprocess memory limit: ${SUBPROCESS_MEMORY_GB:-5}GB"
          echo "============================================"

      # ── Validation: Check YAML file exists ──
      - name: Validate experiment YAML exists
        run: |
          YAML_FILE="batch-runner/experiments/${{ inputs.experiment_yaml }}.yaml"
          if [ ! -f "$YAML_FILE" ]; then
            echo "❌ Error: $YAML_FILE not found"
            exit 1
          fi
          echo "✅ Found: $YAML_FILE"

      # ── Extract experiment_name from YAML if not provided ──
      - name: Extract experiment name from YAML
        run: |
          YAML_PATH="batch-runner/experiments/${{ inputs.experiment_yaml }}.yaml"
          if [ -z "${{ inputs.experiment_name }}" ]; then
            EXPERIMENT_NAME=$(python3 -c "import yaml,sys; cfg=yaml.safe_load(open(sys.argv[1])); n=cfg.get('experiment',{}).get('name',''); (print(n) if n else sys.exit('ERROR: experiment.name not found'))" "$YAML_PATH")
          else
            EXPERIMENT_NAME="${{ inputs.experiment_name }}"
          fi
          echo "experiment_name=$EXPERIMENT_NAME" >> $GITHUB_ENV
          echo "📝 Experiment: $EXPERIMENT_NAME"

      # ── Conditional: LibreOffice + Noto Sans fonts ──
      - name: Read experiment config flags
        id: read_config
        run: |
          YAML_FILE="batch-runner/experiments/${{ inputs.experiment_yaml }}.yaml"
          INSTALL_LO=$(python3 -c "
          import yaml
          with open('$YAML_FILE') as f:
              cfg = yaml.safe_load(f)
          print(cfg.get('execution', {}).get('install_libreoffice', False))
          ")
          WALL_TIMEOUT=$(python3 -c "
          import yaml
          with open('$YAML_FILE') as f:
              cfg = yaml.safe_load(f)
          print(cfg.get('execution', {}).get('wall_timeout', 0))
          ")
          RELAY_MAX_RUNS=$(python3 -c "
          import yaml
          with open('$YAML_FILE') as f:
              cfg = yaml.safe_load(f)
          print(cfg.get('execution', {}).get('relay_max_runs', 3))
          ")
          # Extract repo owner and data source for dynamic HF repo handling
          REPO_SOURCE=$(python3 -c "
          import yaml
          with open('$YAML_FILE') as f:
              cfg = yaml.safe_load(f)
          source = cfg.get('data', {}).get('source', 'dddsss-newbi/${{ inputs.experiment_yaml }}')
          print(source)
          ")
          REPO_OWNER=$(python3 -c "
          source = '$REPO_SOURCE'
          owner = source.split('/')[0] if '/' in source else 'dddsss-newbi'
          print(owner)
          ")
          echo "install_libreoffice=$INSTALL_LO" >> $GITHUB_OUTPUT
          echo "wall_timeout=$WALL_TIMEOUT" >> $GITHUB_OUTPUT
          echo "relay_max_runs=$RELAY_MAX_RUNS" >> $GITHUB_OUTPUT
          echo "repo_owner=$REPO_OWNER" >> $GITHUB_OUTPUT

      - name: Install LibreOffice & Noto Sans fonts
        if: steps.read_config.outputs.install_libreoffice == 'True'
        run: |
          echo "📦 Installing LibreOffice (headless) + Noto Sans fonts + system deps..."
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libreoffice-core \
            libreoffice-calc \
            libreoffice-impress \
            libreoffice-writer \
            fonts-noto-core \
            fonts-noto-cjk \
            ffmpeg \
            libsndfile1 \
            tesseract-ocr \
            poppler-utils \
            wkhtmltopdf \
            ghostscript \
            graphviz libgraphviz-dev \
            libzbar0 \
            libcairo2 libpango-1.0-0 libpangocairo-1.0-0 \
            libgdk-pixbuf-2.0-0 libffi-dev \
            libgl1 libglib2.0-0
          fc-cache -fv
          echo "✅ LibreOffice version:"
          libreoffice --version
          echo "✅ Noto Sans available:"
          fc-list | grep -i "Noto Sans" | head -5
          echo "✅ ffmpeg:"
          ffmpeg -version 2>&1 | head -1
          echo "✅ tesseract:"
          tesseract --version 2>&1 | head -1
          echo "✅ graphviz:"
          dot -V 2>&1

      # ── Relay: Restore checkpoint from previous run ──
      - name: 'Restore checkpoint (relay run)'
        if: inputs.relay_run > 0
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd batch-runner
          echo "Relay run #${{ inputs.relay_run }}: Restoring checkpoint..."
          python3 -c "
          import shutil, os
          from huggingface_hub import hf_hub_download, snapshot_download

          repo_id = '${{ steps.read_config.outputs.repo_owner }}/${{ inputs.experiment_yaml }}'
          try:
              # Download progress.json
              progress_path = hf_hub_download(
                  repo_id=repo_id, repo_type='dataset',
                  filename='_checkpoint/progress.json'
              )
              os.makedirs('workspace', exist_ok=True)
              shutil.copy(progress_path, 'workspace/step2_inference_progress.json')
              print(f'Progress restored from {repo_id}')

              # Download deliverable files
              try:
                  snapshot = snapshot_download(
                      repo_id=repo_id, repo_type='dataset',
                      allow_patterns='_checkpoint/deliverable_files/**'
                  )
                  src = os.path.join(snapshot, '_checkpoint', 'deliverable_files')
                  dst = 'workspace/upload/deliverable_files'
                  if os.path.exists(src):
                      shutil.copytree(src, dst, dirs_exist_ok=True)
                      print('Deliverable files restored')
              except:
                  print('No deliverable files in checkpoint (expected for early relay)')

          except Exception as e:
              print(f'Checkpoint restore failed: {e}')
              print('Continuing without checkpoint (will run all tasks)')
          "

      # ── Step 0: Bootstrap ──
      - name: 'Step 0: Bootstrap submission repo'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd batch-runner
          bash step0_bootstrap.sh experiments/${{ inputs.experiment_yaml }}.yaml

      # ── Step 1: Prepare Tasks ──
      - name: 'Step 1: Prepare tasks'
        run: |
          cd batch-runner
          bash step1_prepare_tasks.sh experiments/${{ inputs.experiment_yaml }}.yaml

      # ── Step 2a: Run Inference (condition_a) ──
      - name: 'Step 2a: Run inference (condition_a)'
        id: step2a
        timeout-minutes: 330    # ← sufficient time for full run, adjust if needed  condition_a
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd batch-runner
          WALL_TIMEOUT="${{ inputs.wall_timeout }}"
          if [ "$WALL_TIMEOUT" = "0" ] && [ "${{ steps.read_config.outputs.wall_timeout }}" -gt 0 ] 2>/dev/null; then
            WALL_TIMEOUT="${{ steps.read_config.outputs.wall_timeout }}"
          fi
          if [ "$WALL_TIMEOUT" -gt 0 ] 2>/dev/null; then
            bash step2_run_inference.sh condition_a --wall-timeout "$WALL_TIMEOUT"
          else
            bash step2_run_inference.sh condition_a
          fi
        continue-on-error: true

      # ── Check if relay is needed (exit code 42 = pending tasks) ──
      - name: 'Check relay status'
        id: check_relay
        run: |
          PENDING=$(python3 -c "
          import json
          try:
              p = json.load(open('batch-runner/workspace/step2_inference_progress.json'))
              pending = sum(1 for r in p.get('results', []) if r.get('status') == 'pending')
              print(pending)
          except:
              print(0)
          ")
          echo "pending_count=$PENDING" >> $GITHUB_OUTPUT
          NEEDS_RELAY=$( [ "$PENDING" -gt 0 ] && echo true || echo false )
          echo "needs_relay=$NEEDS_RELAY" >> $GITHUB_OUTPUT
          echo "Step 2a: pending=$PENDING, needs_relay=$NEEDS_RELAY"

      # ── Verify Step 2a success (fail if step failed AND not relay) ──
      - name: 'Verify Step 2a success'
        if: steps.check_relay.outputs.needs_relay != 'true' && steps.step2a.outcome != 'success'
        run: |
          echo "Step 2a failed (not a relay timeout). Check logs above."
          exit 1

      # ── Checkpoint: Upload progress to HuggingFace for relay ──
      - name: 'Checkpoint: Upload to HuggingFace'
        if: steps.check_relay.outputs.needs_relay == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd batch-runner
          python3 -c "
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ['HF_TOKEN'])
          repo_id = '${{ steps.read_config.outputs.repo_owner }}/${{ inputs.experiment_yaml }}'

          # Upload progress.json
          api.upload_file(
              path_or_fileobj='workspace/step2_inference_progress.json',
              path_in_repo='_checkpoint/progress.json',
              repo_id=repo_id, repo_type='dataset'
          )
          print('Progress checkpoint uploaded')

          # Upload completed deliverable files
          try:
              deliverable_dir = 'workspace/upload/deliverable_files'
              if os.path.exists(deliverable_dir):
                  api.upload_folder(
                      folder_path=deliverable_dir,
                      path_in_repo='_checkpoint/deliverable_files',
                      repo_id=repo_id, repo_type='dataset'
                  )
                  print('Deliverable files checkpoint uploaded')
          except Exception as e:
              print(f'Deliverable files upload skipped: {str(e)}')

          print('Checkpoint uploaded to HuggingFace')
          "

      # ── Self-retrigger: Start relay run ──
      - name: 'Retrigger relay run'
        if: steps.check_relay.outputs.needs_relay == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEXT_RELAY=$(( ${{ inputs.relay_run }} + 1 ))
          MAX_RELAYS="${{ steps.read_config.outputs.relay_max_runs }}"

          if [ $NEXT_RELAY -gt $MAX_RELAYS ]; then
            echo "Max relay runs reached ($MAX_RELAYS). Manual intervention needed."
            exit 1
          fi

          echo "Triggering relay run #$NEXT_RELAY..."
          gh workflow run batch-run.yml \
            -f experiment_yaml="${{ inputs.experiment_yaml }}" \
            -f relay_run="$NEXT_RELAY" \
            -f wall_timeout="${{ inputs.wall_timeout }}" \
            -f dry_run="${{ inputs.dry_run }}"

          echo "Relay run #$NEXT_RELAY triggered. This run will now exit."
          exit 0

      # ── Step 2b: Run Inference (condition_b) — CONDITIONAL ──
      - name: 'Check if condition_b exists'
        id: check_condition_b
        run: |
          YAML_PATH="batch-runner/experiments/${{ inputs.experiment_yaml }}.yaml"
          HAS_CONDITION_B=$(python3 -c "import yaml; cfg=yaml.safe_load(open('${YAML_PATH}')); print('true' if 'condition_b' in cfg else 'false')")
          echo "has_condition_b=$HAS_CONDITION_B" >> $GITHUB_OUTPUT
          echo "Condition B exists: $HAS_CONDITION_B"

      - name: 'Step 2b: Run inference (condition_b)'
        timeout-minutes: 330
        if: steps.check_condition_b.outputs.has_condition_b == 'true' && steps.check_relay.outputs.needs_relay != 'true' && steps.step2a.outcome == 'success'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd batch-runner
          bash step2_run_inference.sh condition_b

      # ── Step 3: Format Results ──
      - name: 'Step 3: Format results'
        if: steps.check_relay.outputs.needs_relay != 'true' && steps.step2a.outcome == 'success'
        run: |
          cd batch-runner
          bash step3_format_results.sh

      # ── Step 4: Fill Parquet ──
      - name: 'Step 4: Fill parquet'
        if: steps.check_relay.outputs.needs_relay != 'true' && steps.step2a.outcome == 'success'
        run: |
          cd batch-runner
          bash step4_fill_parquet.sh

      # ── Check sample_size (skip validation for smoke tests) ──
      - name: 'Check if smoke test'
        id: check_smoke_test
        run: |
          YAML_PATH="batch-runner/experiments/${{ inputs.experiment_yaml }}.yaml"
          SAMPLE_SIZE=$(python3 -c "import yaml; cfg=yaml.safe_load(open('${YAML_PATH}')); s=cfg.get('data',{}).get('filter',{}).get('sample_size',220); print(s if s is not None else 220)")
          IS_SMOKE_TEST=$([ "$SAMPLE_SIZE" -le 3 ] && echo "true" || echo "false")
          echo "sample_size=$SAMPLE_SIZE" >> $GITHUB_OUTPUT
          echo "is_smoke_test=$IS_SMOKE_TEST" >> $GITHUB_OUTPUT
          echo "Sample size: $SAMPLE_SIZE (smoke test: $IS_SMOKE_TEST)"

      # ── Step 5: Validate (skip for smoke tests or dry_run or relay) ──
      - name: 'Step 5: Validate dataset'
        if: inputs.dry_run != true && steps.check_smoke_test.outputs.is_smoke_test != 'true' && steps.check_relay.outputs.needs_relay != 'true' && steps.step2a.outcome == 'success'
        run: |
          cd batch-runner
          bash step5_validate.sh

      # ── Step 6: Generate Experiment Report ──
      - name: 'Step 6: Generate experiment report'
        if: steps.check_relay.outputs.needs_relay != 'true' && steps.step2a.outcome == 'success'
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
        run: |
          cd batch-runner
          bash step6_report.sh
        continue-on-error: true   # report failure must not block Step 7 upload

      # ── Step 7: Upload to HuggingFace (only if not dry_run and not relay) ──
      - name: 'Step 7: Upload to HuggingFace'
        if: inputs.dry_run != true && steps.check_relay.outputs.needs_relay != 'true' && steps.step2a.outcome == 'success'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd batch-runner
          bash step7_upload_hf.sh --test

      # ── Create Pull Request (only if not dry_run and not relay) ──
      - name: Create Pull Request with results
        if: inputs.dry_run != true && steps.check_relay.outputs.needs_relay != 'true' && steps.step2a.outcome == 'success'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "experiment: ${{ env.experiment_name }}"
          title: "🧪 New Experiment: ${{ env.experiment_name }}"
          body: |
            ## Experiment Results

            | Field | Value |
            |---|---|
            | **Name** | ${{ env.experiment_name }} |
            | **YAML Config** | `${{ inputs.experiment_yaml }}` |
            | **Run ID** | [${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

            ### Pipeline Summary
            - ✅ Step 0: Bootstrap submission repo
            - ✅ Step 1: Prepare tasks
            - ✅ Step 2: Run inference (condition_a)
            - ✅ Step 2: Run inference (condition_b) — ${{ steps.check_condition_b.outputs.has_condition_b == 'true' && 'Run' || 'Skipped' }}
            - ✅ Step 3: Format results
            - ✅ Step 4: Fill parquet
            - ✅ Step 5: Validate dataset — ${{ steps.check_smoke_test.outputs.is_smoke_test == 'true' && 'Skipped (smoke test)' || 'Run' }}
            - ✅ Step 6: Generate experiment report
            - ✅ Step 7: Upload to HuggingFace

            Results uploaded to HuggingFace dataset repository.
            Review and merge to finalize the experiment.
          branch: experiment/${{ inputs.experiment_yaml }}
          labels: experiment,automated

      # ── Cleanup relay checkpoint on HF (only after successful completion) ──
      - name: 'Cleanup relay checkpoint'
        if: inputs.relay_run > 0 && steps.check_relay.outputs.needs_relay != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        continue-on-error: true
        run: |
          python3 -c "
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ['HF_TOKEN'])
          repo_id = '${{ steps.read_config.outputs.repo_owner }}/${{ inputs.experiment_yaml }}'

          try:
              # Delete progress checkpoint
              api.delete_file(path_in_repo='_checkpoint/progress.json', repo_id=repo_id, repo_type='dataset')
              print('Relay checkpoint progress.json deleted')

              # Try to delete deliverable files checkpoint too
              try:
                  api.delete_file(path_in_repo='_checkpoint/deliverable_files', repo_id=repo_id, repo_type='dataset')
                  print('Relay checkpoint deliverable_files deleted')
              except:
                  pass

              print('Relay checkpoint cleaned up')
          except Exception as e:
              print(f'Cleanup skipped: {str(e)}')
          "

      # ── Summary step ──
      - name: Show summary
        if: always()
        run: |
          echo "════════════════════════════════════════"
          echo "📊 Batch Experiment Complete"
          echo "════════════════════════════════════════"
          echo "Experiment: ${{ env.experiment_name }}"
          echo "YAML Config: ${{ inputs.experiment_yaml }}"
          echo "Dry Run: ${{ inputs.dry_run }}"
          echo ""
          echo "Check artifacts for full pipeline output."

      # ── Upload artifacts ──
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: batch-results-${{ github.run_id }}
          path: |
            batch-runner/workspace/
            batch-runner/results/
          retention-days: 30
